name = "x-gis-pmtiles-proxy"
main = "worker.ts"
compatibility_date = "2024-12-01"

# No KV / Durable Objects / R2 bindings — this worker is a pure
# proxy. Cloudflare's edge cache is configured per-request via
# `cf.cacheTtl` in worker.ts (no separate cache binding needed).

# Free Workers tier limits (as of late 2024):
#   * 100,000 requests / day
#   * 10 ms CPU time / request
# This worker uses negligible CPU — it just relays bodies through.
# A single PMTiles archive reload (~50 tile fetches) costs ~50
# requests, so the free tier covers ~2,000 demo loads / day.
