name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      # Merge the runnable playground under /play/ inside the
      # marketing-site artifact. /X-GIS/ serves the docs + examples
      # marketing site, /X-GIS/play/demo.html?id=<name> serves the
      # actual interactive demos that the /examples gallery cards
      # deep-link to. The playground vite config already emits with
      # base=/X-GIS/play/ in CI, so asset URLs resolve as-is.
      - name: Merge playground into site/dist/play/
        run: |
          mkdir -p site/dist/play
          cp -R playground/dist/. site/dist/play/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
