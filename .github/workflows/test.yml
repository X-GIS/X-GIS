name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Build first so the typescript project references (compiler →
      # runtime → playground/site) emit and tests downstream of compiler
      # can resolve the published types. Same step as deploy-pages.yml.
      - run: bun run build

      # vitest is hoisted to the workspace root (node_modules/.bin) by
      # bun install. The filesystem args correspond to the source roots
      # where tests live; vitest.config.* (if any) is respected
      # automatically.
      - run: ./node_modules/.bin/vitest run compiler/src blueprint/src runtime/src
