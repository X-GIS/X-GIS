name: playground-audit

# Status: INFORMATIONAL (continue-on-error: true).
#
# Runs the demo + fixture audit and the targeted regression specs under
# headless Chromium on Ubuntu runners. Chromium falls back to Mesa's
# SwiftShader-WebGPU on runners with no GPU, which currently CANNOT
# render the X-GIS pipeline visibly — point billboards stay blank,
# polygons fill with the wrong colours, and device-lost panics fire on
# ~10/123 demos. So pixel-counting assertions and camera-finite checks
# fire false-positives that don't reproduce locally on real WebGPU.
#
# Until a self-hosted GPU runner lands, the canonical visual regression
# workflow is: `bun x playwright test e2e/_demo-fixture-audit.spec.ts`
# locally on real WebGPU (0 broken across 123 demos there). On CI we
# still surface artifacts (REPORT.md + screenshots + traces) so PR
# authors can inspect what changed. Specs that signal `XGIS_SOFTWARE_GPU`
# (see _projection-coverage.spec.ts) skip their pixel-count assertions
# in this environment but keep the logic-only ones (NaN matrix,
# alias misroute, console error scan) which are GPU-independent.

on:
  pull_request:
    paths:
      # Touching any of these can break a demo's ability to render.
      # Skip on doc-only PRs.
      - 'runtime/**'
      - 'compiler/**'
      - 'blueprint/**'
      - 'playground/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/playground-audit.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Single job: regression specs + full demo audit share one setup/
  # install/build. Was split into two parallel jobs; merge cuts ~3-4 min
  # of duplicated install + playwright-install + build off the workflow.
  # Both spec batches still run (audit has `if: always()`) so a
  # regression-spec failure doesn't mask audit-only regressions.
  e2e:
    runs-on: ubuntu-latest
    # 45 min: regression-specs alone needs ~16 min on SwiftShader (the
    # projection-coverage spec is 108 cells × ~5-8s each there), and the
    # demo audit needs ~13 min. Running them sequentially in one job
    # needs the sum.
    timeout-minutes: 45
    continue-on-error: true
    env:
      HEADED: '0'
      # Surface to specs so pixel-count assertions can self-skip on
      # SwiftShader (where rendering false-positives drown signal),
      # while keeping logic assertions (NaN matrix, alias misroute) on.
      XGIS_SOFTWARE_GPU: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache the bun package store + repo node_modules + Playwright's
      # bundled browsers. Hits save ~2-3 min of `bun install` and
      # ~30-60 s of `playwright install --with-deps chromium`. Key is
      # bun.lock-hashed so it invalidates correctly on dep bump.
      - name: Cache bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            playground/node_modules
            runtime/node_modules
            compiler/node_modules
            blueprint/node_modules
            site/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          # Playwright pin lives in package.json; key by the lockfile
          # which captures the exact resolved version.
          key: pw-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            pw-${{ runner.os }}-

      - run: bun install
      - run: bun run build

      # Skip the heavy download if the cache restored a working
      # browser. Always install system deps (--with-deps) because GH
      # runners don't persist apt packages across runs.
      - name: Install Playwright (browsers if not cached, system deps always)
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: playground

      - name: Targeted regression specs
        id: specs
        run: bunx playwright test
          e2e/_picking-bgl-mismatch.spec.ts
          e2e/_font-vendoring.spec.ts
          e2e/_single-point-bounds-fit.spec.ts
          e2e/_zoom-interp-point-size.spec.ts
          e2e/_ortho-tilt-backface.spec.ts
          e2e/_projection-coverage.spec.ts
          --workers=3 --reporter=line
        working-directory: playground

      # `if: always()` ensures the audit still runs even when the
      # regression specs fail. Both are informational on SwiftShader; we
      # want artifacts from both regardless of which one signalled.
      # workers=4: audit is now per-demo test() (123 tests) so Playwright
      # parallelizes across workers. ubuntu-latest has 4 vCPU / 16 GB so
      # 4 chrome instances fit. Sequential single-test baseline was
      # ~13 min; with 4 workers ~3-4 min wall-clock.
      - name: Demo + fixture audit
        if: always()
        run: bunx playwright test e2e/_demo-fixture-audit.spec.ts --workers=4 --reporter=line
        working-directory: playground

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-traces
          path: |
            playground/test-results/
            playground/e2e/__demo-audit__/REPORT.md
            playground/e2e/__demo-audit__/full.json
            playground/e2e/__demo-audit__/screens/
          retention-days: 7
