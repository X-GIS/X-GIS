<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="X-GIS — A language for cartography">
  <defs>
    <radialGradient id="halo" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#a1a1a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Hairline grid suggestion (kept very faint) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="200" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#2997ff">
    Introducing X-GIS
  </text>

  <!-- Title -->
  <text x="600" y="345" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="104" font-weight="500" fill="url(#title-fade)">
    A language for
  </text>
  <text x="600" y="450" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="104" font-weight="500" fill="url(#title-fade)">
    cartography.
  </text>
</svg>
