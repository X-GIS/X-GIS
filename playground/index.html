<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-GIS Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 3rem 2rem 2rem;
      max-width: 960px;
      margin: 0 auto;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header h1 span { color: #3b82f6; }
    header p {
      color: #777;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    #demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      padding: 0 2rem 4rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .demo-card {
      display: flex;
      flex-direction: column;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 1.4rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .demo-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px #3b82f640, 0 8px 24px #0004;
      transform: translateY(-2px);
    }
    .demo-card h3 {
      color: #e0e0e0;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .demo-card .tag {
      display: inline-block;
      font-size: 0.65rem;
      color: #3b82f6;
      background: #3b82f615;
      border: 1px solid #3b82f630;
      border-radius: 4px;
      padding: 1px 6px;
      margin-bottom: 0.5rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .demo-card p {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 0.8rem;
      line-height: 1.45;
      flex: 1;
    }
    .demo-card pre {
      background: #0a0a12;
      border: 1px solid #1a1a28;
      border-radius: 8px;
      padding: 0.7rem;
      font-family: 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
      font-size: 0.68rem;
      color: #7b8fad;
      overflow: hidden;
      line-height: 1.4;
      white-space: pre;
    }

    @media (max-width: 640px) {
      header { padding: 2rem 1rem 1.5rem; }
      #demo-grid { grid-template-columns: 1fr; padding: 0 1rem 3rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>X-GIS</span> Playground</h1>
    <p>A DSL and WebGPU rendering engine for GIS maps. Click a demo below to explore.</p>
  </header>
  <div id="demo-grid"></div>
  <script type="module" src="/src/gallery.ts"></script>
</body>
</html>
