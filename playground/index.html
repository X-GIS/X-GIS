<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-GIS Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Instrument+Serif&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080c;
      --surface: #0c1017;
      --surface-2: #111820;
      --border: #1a2233;
      --border-hover: #2a3a52;
      --text: #c8d3e0;
      --text-dim: #5a6a7e;
      --text-muted: #3a4858;
      --accent: #38bdf8;
      --accent-dim: #38bdf820;
      --warm: #f59e0b;
      --green: #34d399;
      --rose: #fb7185;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Fira Code', monospace;
      --font-serif: 'Instrument Serif', Georgia, serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Coordinate grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 70%);
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      padding: 4rem 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      z-index: 1;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1rem;
    }

    .hero-logo {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #0c4a6e, #0e7490);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-weight: 500; font-size: 16px;
      color: #38bdf8;
      letter-spacing: -0.04em;
      box-shadow: 0 0 0 1px #164e6320, 0 4px 20px #0c4a6e40;
      flex-shrink: 0;
    }

    .hero h1 {
      font-family: var(--font-serif);
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #e8eff8;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.65;
      max-width: 560px;
      margin-top: 0.6rem;
    }
    .hero-sub code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .hero-badges {
      display: flex; gap: 8px; margin-top: 1rem;
    }
    .hero-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 10px;
      letter-spacing: 0.03em;
    }

    /* ── Filters ── */
    .filters {
      position: relative; z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 1.4rem 2rem 0.5rem;
      max-width: 1200px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin-right: 4px;
    }
    .tag-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 5px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .tag-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface);
    }
    .tag-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Counter ── */
    #demo-count {
      position: relative; z-index: 1;
      display: block;
      padding: 0.3rem 2rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    /* ── Grid ── */
    #demo-grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      padding: 0 2rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .demo-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.5rem 1.2rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      opacity: 0;
      animation: card-in 0.4s ease forwards;
    }
    .demo-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 40px #00000050, inset 0 1px 0 #ffffff06;
      transform: translateY(-3px);
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }
    .card-tag {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      border: 1px solid;
      border-radius: 4px;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #dde6f0;
      letter-spacing: -0.01em;
    }
    .card-desc {
      color: var(--text-dim);
      font-size: 0.8rem;
      line-height: 1.5;
      margin-bottom: 0.9rem;
      flex: 1;
    }
    .card-code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      color: var(--text-dim);
      overflow: hidden;
      line-height: 1.55;
      white-space: pre;
      max-height: 160px;
    }
    .card-arrow {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 0.7rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      gap: 4px;
      transition: color 0.2s;
    }
    .demo-card:hover .card-arrow { color: var(--accent); }
    .card-arrow svg { transition: transform 0.2s; }
    .demo-card:hover .card-arrow svg { transform: translateX(3px); }

    /* ── Footer ── */
    .footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 0 2rem 3rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .footer a { color: var(--text-dim); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    @media (max-width: 740px) {
      .hero { padding: 2.5rem 1.2rem 1.5rem; }
      .hero h1 { font-size: 2rem; }
      .filters { padding: 1rem 1.2rem 0.4rem; }
      #demo-count { padding: 0.3rem 1.2rem 0.8rem; }
      #demo-grid { grid-template-columns: 1fr; padding: 0 1.2rem 4rem; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-brand">
      <div class="hero-logo">X</div>
      <div>
        <h1><em>X-GIS</em> Playground</h1>
      </div>
    </div>
    <p class="hero-sub">
      A declarative language for maps. Define data with <code>source</code>, render with <code>layer</code> and
      Tailwind-style utilities or CSS-like properties. Powered by WebGPU.
    </p>
    <div class="hero-badges">
      <span class="hero-badge">WebGPU</span>
      <span class="hero-badge">TypeScript</span>
      <span class="hero-badge" id="demo-count"></span>
    </div>
  </section>

  <div class="filters" id="filter-bar">
    <span class="filter-label">Filter</span>
  </div>

  <div id="demo-grid"></div>

  <footer class="footer">
    <a href="https://github.com/nicekid1/X-GIS">github.com/nicekid1/X-GIS</a>
  </footer>

  <script type="module" src="/src/gallery.ts"></script>
</body>
</html>
