<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coastline — X-GIS</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <canvas id="map"></canvas>
  <div id="topbar">
    <a href="../">&larr; Examples</a><span class="sep">/</span>
    <span class="title">Coastline</span>
    <span class="desc">World coastline — line-only rendering</span>
  </div>
  <details id="source-panel" open>
    <summary>Source</summary>
    <pre id="source-code">source coast {
  type: geojson
  url: "ne_110m_coastline.geojson"
}

layer coastline {
  source: coast
  | stroke-amber-400 stroke-2
}</pre>
  </details>
  <div id="status">Loading...</div>
  <div id="error"><h2>Error</h2><pre id="error-msg"></pre></div>
  <script type="module">
    import { XGISMap } from '@xgis/runtime'
    const map = new XGISMap(document.getElementById('map'))
    map.showInspector()
    map.run(document.getElementById('source-code').textContent, '../data/')
      .then(() => { document.getElementById('status').textContent = 'Coastline | scroll to zoom, drag to pan' })
      .catch(e => { document.getElementById('error').style.display = 'block'; document.getElementById('error-msg').textContent = String(e) })
  </script>
</body>
</html>
