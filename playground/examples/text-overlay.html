<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Overlay — X-GIS</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <canvas id="map"></canvas>
  <div id="topbar">
    <a href="../">&larr; Examples</a>
    <span class="sep">/</span>
    <span class="title">Text Overlay</span>
    <span class="desc">SDF text overlays anchored to lon/lat — Batch 1c integration test</span>
  </div>
  <details id="source-panel" open>
    <summary>Source</summary>
    <pre id="source-code">source world {
  type: geojson
  url: "countries.geojson"
}

layer countries {
  source: world
  | fill-stone-200 stroke-stone-400 stroke-1
}</pre>
  </details>
  <div id="status">Loading...</div>
  <div id="error"><h2>Error</h2><pre id="error-msg"></pre></div>
  <script type="module">
    import { XGISMap } from '@xgis/runtime'
    const map = new XGISMap(document.getElementById('map'))
    map.showInspector()
    map.run(document.getElementById('source-code').textContent, '../data/')
      .then(() => {
        // Anchor a few labels at well-known cities so the overlay
        // pipeline is exercised at multiple zoom + pan states.
        const labels = [
          { name: 'SEOUL',     anchor: [126.9780, 37.5665] },
          { name: 'TOKYO',     anchor: [139.6917, 35.6895] },
          { name: 'NEW YORK',  anchor: [-74.0060, 40.7128] },
          { name: 'LONDON',    anchor: [-0.1276,  51.5074] },
          { name: 'PARIS',     anchor: [2.3522,   48.8566] },
          { name: 'CAIRO',     anchor: [31.2357,  30.0444] },
          { name: 'SYDNEY',    anchor: [151.2093, -33.8688] },
          { name: 'RIO',       anchor: [-43.1729, -22.9068] },
        ]
        for (const l of labels) {
          map.addOverlay({
            text: l.name,
            anchor: l.anchor,
            size: 16,
            color: [1, 1, 1, 1],
            halo: { color: [0, 0, 0, 0.85], width: 1.5 },
          })
        }
        document.getElementById('status').textContent =
          'Text overlays | scroll to zoom, drag to pan'
      })
      .catch(e => {
        document.getElementById('error').style.display = 'block'
        document.getElementById('error-msg').textContent = String(e)
      })
  </script>
</body>
</html>
