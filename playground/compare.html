<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-GIS ↔ MapLibre Compare</title>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080c;
      --surface: #0c1017;
      --surface2: #111820;
      --border: #1a2233;
      --border-hover: #2a3a52;
      --text: #c8d3e0;
      --text-dim: #5a6a7e;
      --text-muted: #3a4858;
      --accent: #38bdf8;
      --green: #4ade80;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Fira Code', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      height: 100dvh;
    }
    #layout {
      display: grid;
      grid-template-rows: 44px 1fr 28px;
      height: 100vh;
      height: 100dvh;
    }
    /* ── Top bar ── */
    .bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .bar a, .bar select, .bar input, .bar button {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      text-decoration: none;
      outline: none;
    }
    .bar a { color: var(--text-dim); }
    .bar a:hover { color: var(--accent); border-color: var(--border-hover); }
    .bar select { cursor: pointer; }
    .bar select:focus, .bar input:focus { border-color: var(--accent); }
    #style-url { width: 320px; font-family: var(--font-mono); font-size: 11px; }
    .bar button { cursor: pointer; }
    .bar button:hover { border-color: var(--border-hover); }
    .spacer { flex: 1; }
    .label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    /* ── Map panes ── */
    #panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
      position: relative;
    }
    .pane {
      position: relative;
      min-width: 0;
      overflow: hidden;
    }
    .pane + .pane { border-left: 1px solid var(--border); }
    .pane-title {
      position: absolute;
      top: 8px; left: 8px;
      z-index: 5;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      background: rgba(10, 14, 22, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .pane-title.left { color: #c084fc; border-color: #c084fc40; }
    .pane-title.right { color: var(--accent); border-color: #38bdf840; }
    #ml-map {
      width: 100%; height: 100%;
    }
    #xg-canv {
      width: 100%; height: 100%;
      display: block; touch-action: none;
    }
    /* MapLibre attribution + controls — toned down for compare layout */
    .maplibregl-ctrl-attrib {
      font-size: 9px;
      background: rgba(10, 14, 22, 0.65);
      color: var(--text-muted);
    }
    .maplibregl-ctrl-attrib a { color: var(--text-dim); }
    /* ── Bottom hash bar ── */
    .hashbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }
    #cam-hash { color: var(--text); }
    #status-msg { color: var(--text-muted); }
    /* ── Mobile: stack panes vertically ── */
    @media (max-width: 740px), (pointer: coarse) {
      #panes { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
      #style-url { width: 160px; }
    }
  </style>
</head>
<body>
  <div id="layout">
    <div class="bar">
      <a href=".">← Gallery</a>
      <span class="label">Style</span>
      <select id="style-select"></select>
      <input id="style-url" type="text" placeholder="or paste a style.json URL…" spellcheck="false">
      <button id="reload-btn" title="Re-fetch + remount both maps">↻ Reload</button>
      <span class="spacer"></span>
      <span class="label">MapLibre ↔ X-GIS</span>
    </div>

    <div id="panes">
      <div class="pane">
        <div class="pane-title left">MapLibre GL JS</div>
        <div id="ml-map"></div>
      </div>
      <div class="pane">
        <div class="pane-title right">X-GIS (WebGPU)</div>
        <canvas id="xg-canv"></canvas>
      </div>
    </div>

    <div class="hashbar">
      <span id="cam-hash">#0/0/0</span>
      <span class="spacer"></span>
      <span id="status-msg">Loading…</span>
    </div>
  </div>

  <script type="module" src="/src/compare-runner.ts"></script>
</body>
</html>
